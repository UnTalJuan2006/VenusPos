<!DOCTYPE html>

<body>
    

    <!-- SIDEBAR -->

        <div class="sb-brand">

            <div class="sb-texts">

        </div>
        <nav class="sb-nav">
            <div class="sb-group-lbl">Principal</div>
            <a class="sb-item" href="Dashboard.html" data-tip="Dashboard">
                <svg class="sb-ic" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <rect x="3" y="3" width="7" height="7" rx="1.5" />
                    <rect x="14" y="3" width="7" height="7" rx="1.5" />
                    <rect x="3" y="14" width="7" height="7" rx="1.5" />
                    <rect x="14" y="14" width="7" height="7" rx="1.5" />
                </svg>
                <span class="sb-lbl">Dashboard</span>
            </a>
            <a class="sb-item" href="Reservas.html" data-tip="Reservas">
                <svg class="sb-ic" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <rect x="3" y="4" width="18" height="18" rx="2" />

            <a class="sb-item" href="Caja.html" data-tip="Caja">

                </svg>
                <span class="sb-lbl">Caja</span>
            </a>
            <div class="sb-group-lbl">Gestion</div>
            <a class="sb-item " href="Clientes.html" data-tip="Clientes">
                <svg class="sb-ic" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
                </svg>
                <span class="sb-lbl">Clientes</span>
            </a>
            <a class="sb-item" href="Mascotas.html" data-tip="Mascotas">
                <svg class="sb-ic" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path d="M12 14c2.5 0 4 1.5 4 3s-1.5 3-4 3-4-1.5-4-3 1.5-3 4-3z" />
                    <circle cx="7" cy="10" r="1.5" />
                    <circle cx="11" cy="8" r="1.5" />
                    <circle cx="15" cy="8" r="1.5" />
                    <circle cx="17" cy="10" r="1.5" />
                </svg>
                <span class="sb-lbl">Mascotas</span>
            </a>
            <a class="sb-item" href="Empleados.html" data-tip="Empleados">
                <svg class="sb-ic" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="sb-lbl">Empleados</span>
            </a>
            <a class="sb-item" href="Servicios.html" data-tip="Servicios">
                <svg class="sb-ic" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="12" r="3" />

                <svg class="sb-ic" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">

                </svg>
                <span class="sb-lbl">Historial</span>
            </a>
            <a class="sb-item active" href="Productos.html" data-tip="Productos">
                <svg class="sb-ic" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 7L12 3 4 7m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />

        <div class="sb-bottom">
            <button class="sb-collapse-btn" onclick="toggleSidebar()">
                <div class="sb-collapse-ico">
                    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.8)" stroke-width="2.5">
                        <path d="M15 19l-7-7 7-7" />
                    </svg>
                </div>
                <span class="sb-collapse-lbl">Contraer menu</span>
            </button>
        </div>

    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <div class="tb-left">
                <div class="tb-sect">Gestión</div>
                <h2>Productos</h2>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content" style="align-items: center; justify-content: center;">
            <div style="display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px; max-width: 400px;">

                <div style="width: 72px; height: 72px; border-radius: 50%; background: var(--purple-soft); border: 1.5px solid var(--purple-pale); display: flex; align-items: center; justify-content: center;">
                    <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="var(--purple)" stroke-width="1.6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7L12 3 4 7m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                </div>

                <div>
                    <h1 style="font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -.02em; margin-bottom: 8px;">
                        Funciones próximamente
                    </h1>
                    <p style="font-size: 14px; color: var(--muted); font-weight: 500; line-height: 1.6;">
                        Estamos construyendo esta sección. Pronto podrás gestionar tu inventario de productos desde aquí. 
                    </p>
                </div>

                <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 8px;">
                    <span style="display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--purple); background: var(--purple-soft); border: 1.5px solid var(--purple-pale); border-radius: 8px; padding: 6px 14px;">
                        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z" /><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16" /></svg>
                        Inventario
                    </span>
                    <span style="display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--purple); background: var(--purple-soft); border: 1.5px solid var(--purple-pale); border-radius: 8px; padding: 6px 14px;">
                        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z" /></svg>
                        Precios
                    </span>
                    <span style="display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--purple); background: var(--purple-soft); border: 1.5px solid var(--purple-pale); border-radius: 8px; padding: 6px 14px;">
                        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                        Reportes
                    </span>
                </div>

            </div>
        </div>

    </div>

</html>
